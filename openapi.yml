          description: A/B 테스트용 B 제목
          example: "Subject B"
        senderEmail:
          type: string
          format: email
          description: 발신자 이메일
          example: "abcd1234-ab12-cd34-ef56-abcdef123456"
        senderName:
          type: string
          description: 발신자 이름
          example: "Sender Name"
        senderNameA:
          type: string
          description: A/B 테스트용 A 발신자 이름
          example: "Sender Name A"
        senderNameB:
          type: string
          description: A/B 테스트용 B 발신자 이름
          example: "Sender Name B"
        listId:
          type: integer
          format: int64
          description: 주소록 아이디
