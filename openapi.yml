  /lists/{id}/subscribers:
    post:
      summary: 구독자 추가
      operationId: addSubscriber
      x-badges:
        - name: "스탠다드"
          position: before
        - name: "프로"
          position: before
        - name: "엔터프라이즈"
          position: before
        - name: "1000회/분"
          position: before
      description: |
        주소록에 구독자를 추가합니다.

        - 이메일 주소는 최대 **64자**까지 허용됩니다.
        - `updateEnabled`가 `false`(기본값)이면, 이미 존재하는 구독자를 추가할 때 에러가 발생합니다.
        - `updateEnabled`가 `true`이면, 이미 존재하는 구독자의 정보를 업데이트합니다.

        > **참고**: 신규 추가 시 `200`, 기존 구독자 업데이트 시 `201`이 반환됩니다.
      tags:
        - "주소록 - 구독자"
      parameters:
        - name: id
          in: path
          required: true
          description: 주소록 아이디
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSubscriberRequest'
            example:
              subscriber:
                email: "gildong.go@stibee.com"
                status: "subscribed"
                marketingAllowed: true
                fields:
                  name: "고길동"
              updateEnabled: true
      responses:
        '200':
          description: 구독자 추가 성공
          content:
            text/plain: # 이 응답은 실제로는 JSON을 반환할 수 있으나, 요청에 따라 text/plain으로 변경
              schema:
                type: string
                example: "ok"
        '201':
          description: 구독자 업데이트 성공
          content:
            text/plain: # 이 응답은 실제로는 JSON을 반환할 수 있으나, 요청에 따라 text/plain으로 변경
              schema:
                type: string
                example: "ok"
        '400':
          description: 실패
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - httpStatusCode
                  - message
                properties:
                  code:
                    type: string
                    enum:
                      - Errors.Authorization.PermissionDenied
                      - Errors.Data.InvalidRequest
                      - Errors.List.NoEmail
                      - Errors.List.InvalidEmail
                      - Errors.List.AlreadyExistEmail
                      - Errors.List.InvalidSubscriberVar
                      - Errors.List.InvalidSubscriberStatus
                    description: 에러 코드
                  httpStatusCode:
                    type: integer
                    description: HTTP 상태 코드
                    example: 400
                  message:
                    type: string
                    description: 에러 메시지
              examples:
                PermissionDenied:
                  description: "주소록의 소유자가 아닌 경우"
                  value:
                    code: "Errors.Authorization.PermissionDenied"
                    httpStatusCode: 400
                    message: "허용되지 않은 요청입니다."
                InvalidRequest:
                  description: "유효하지 않은 주소록 ID인 경우"
                  value:
                    code: "Errors.Data.InvalidRequest"
                    httpStatusCode: 400
                    message: "잘못된 요청입니다."
                NoEmail:
                  description: "추가 실패 - 이메일 주소가 비어있음"
                  value:
                    code: "Errors.List.NoEmail"
                    httpStatusCode: 400
                    message: "이메일 주소를 입력하세요."
                InvalidEmail:
                  description: "추가 실패 - 이메일 주소 형식이 잘못되었거나 64자를 초과함"
                  value:
                    code: "Errors.List.InvalidEmail"
                    httpStatusCode: 400
                    message: "잘못된 이메일 주소입니다."
                AlreadyExistEmail:
                  description: "추가 실패 - updateEnabled가 false일 때 이미 존재하는 구독자"
                  value:
                    code: "Errors.List.AlreadyExistEmail"
                    httpStatusCode: 400
                    message: "이미 존재하는 이메일 입니다."
                InvalidSubscriberVar:
                  description: "추가 실패 - 정의되지 않은 사용자 정의 필드"
                  value:
                    code: "Errors.List.InvalidSubscriberVar"
                    httpStatusCode: 400
                    message: "사용할 수 없는 사용자정의필드 입니다."
                InvalidSubscriberStatus:
                  description: "추가 실패 - 유효하지 않은 구독 상태 값"
                  value:
                    code: "Errors.List.InvalidSubscriberStatus"
                    httpStatusCode: 400
                    message: "잘못된 구독자 상태 입니다."
    get:
      summary: 구독자 목록 조회
      operationId: getSubscribers
      x-badges:
        - name: "스탠다드"
          position: before
        - name: "프로"
          position: before
        - name: "엔터프라이즈"
          position: before
        - name: "100회/분"
          position: before
      description: |
        주소록의 구독자 목록을 조회합니다.

        - `statuses` 파라미터로 특정 상태의 구독자만 필터링할 수 있습니다.
        - 한 번에 조회할 수 있는 최대 개수는 1,000건입니다.
      tags:
        - "주소록 - 구독자"
      parameters:
        - name: id
          in: path
          required: true
          description: 주소록 아이디
          schema:
            type: integer
        - name: statuses
          in: query
          required: false
          description: |
            조회할 구독자 상태 목록
            * 여러 상태를 조회할 경우 콤마로 구분
          schema:
            type: string
            example: "subscribed,unsubscribed,archived,ready"
        - name: offset
          in: query
          required: false
          description: 현재 데이터 조회가 시작되는 위치
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: limit
          in: query
          required: false
          description: |
            한 번에 가져올 데이터의 최대 개수
            * 조회된 아이템의 최대 개수는 1000을 넘을 수 없다.
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: 성공적으로 조회됨
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetSubscribersResponse'
              example:
                - email: "gildong@stibee.com"
                  status: "subscribed"
                  fields:
                    $ad_agreed: ""
                    age: "45"
                    name: "고길동"
                  createdTime: "2024-11-12 17:09:13 +0900 KST"
                  modifiedTime: "2024-11-17 20:01:11 +0900 KST"
        '400':
          description: 실패
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - httpStatusCode
                  - message
                properties:
                  code:
                    type: string
                    enum:
                      - Errors.Authorization.PermissionDenied
                      - Errors.Data.LimitExceeded
                    description: 에러 코드
                  httpStatusCode:
                    type: integer
                    description: HTTP 상태 코드
                    example: 400
                  message:
                    type: string
                    description: 에러 메시지
              examples:
                PermissionDenied:
                  description: "주소록의 소유자가 아닌 경우"
                  value:
                    code: "Errors.Authorization.PermissionDenied"
                    httpStatusCode: 400
                    message: "허용되지 않은 요청입니다."
                LimitExceeded:
                  description: "한번에 요청할 수 있는 범위를 초과한 경우"
                  value:
                    code: "Errors.Data.LimitExceeded"
                    httpStatusCode: 400
                    message: "요청 제한을 초과하였습니다."
    delete:
      summary: 구독자 완전 삭제
      operationId: deleteSubscribers
      x-badges:
        - name: "스탠다드"
          position: before
        - name: "프로"
          position: before
        - name: "엔터프라이즈"
          position: before
        - name: "1000회/분"
          position: before
      description: |
        주소록에서 구독자를 완전히 삭제합니다. 삭제된 구독자 데이터는 복구할 수 없습니다.

        - 한 번에 최대 **100명**까지 삭제할 수 있습니다.
        - 삭제된 구독자에게는 `unsubscribe` API를 사용할 수 없습니다.
      tags:
        - "주소록 - 구독자"
      parameters:
        - name: id
          in: path
          required: true
          description: 주소록 아이디
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteSubscribersRequest'
            example:
              subscribers: ["gildong.go@stibee.com", "dooly@stibee.com"]
      responses:
        '200':
          description: 구독자 삭제 성공
          content:
            text/plain:
              schema:
                type: string
                example: "ok"
        '400':
          description: 실패
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - httpStatusCode
                  - message
                properties:
                  code:
                    type: string
                    enum:
                      - Errors.Authorization.PermissionDenied
                      - Errors.Data.LimitExceeded
                    description: 에러 코드
                  httpStatusCode:
                    type: integer
                    description: HTTP 상태 코드
                    example: 400
                  message:
                    type: string
                    description: 에러 메시지
              examples:
                PermissionDenied:
                  description: "주소록의 소유자가 아닌 경우"
                  value:
                    code: "Errors.Authorization.PermissionDenied"
                    httpStatusCode: 400
                    message: "허용되지 않은 요청입니다."
                LimitExceeded:
                  description: "한번에 삭제할 수 있는 구독자 수 초과 (최대 100명)"
                  value:
                    code: "Errors.Data.LimitExceeded"
                    httpStatusCode: 400
                    message: "요청 제한을 초과하였습니다."
