                    code: "Errors.Authorization.PermissionDenied"
                    httpStatusCode: 400
                    message: "허용되지 않은 요청입니다."
  /lists/{id}/subscribers/{subscriberEmail}/unsubscribe:
    post:
      summary: 구독자 수신거부
      operationId: unsubscribeSubscriber
      x-badges:
        - name: "스탠다드"
          position: before
        - name: "프로"
          position: before
        - name: "엔터프라이즈"
          position: before
        - name: "1000회/분"
          position: before
      description: |
        구독자의 상태를 수신거부(unsubscribed)로 변경합니다. 구독자 데이터는 유지됩니다.

        - 이미 수신거부 상태인 구독자에 대한 호출은 에러 없이 성공합니다.
        - `DELETE /lists/{id}/subscribers`로 완전 삭제된 구독자에게는 사용할 수 없습니다.

        > **참고**: `DELETE`는 구독자 데이터를 완전히 삭제(복구 불가)하고, `unsubscribe`는 상태만 변경(데이터 유지)합니다.
      tags:
        - "주소록 - 구독자"
      parameters:
        - name: id
          in: path
          required: true
          description: 주소록 아이디
          schema:
            type: integer
        - name: subscriberEmail
          in: path
          required: true
          description: 구독자 이메일 주소
          schema:
            type: string
            format: email
      responses:
        '200':
          description: 성공적으로 수신거부 처리됨
          content:
            text/plain:
              schema:
                type: string
                example: "ok"
        '400':
          description: 실패
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - httpStatusCode
                  - message
                properties:
                  code:
                    type: string
                    enum:
                      - Errors.Authorization.PermissionDenied
                      - Errors.List.NotExistEmail
                    description: 에러 코드
                  httpStatusCode:
                    type: integer
                    description: HTTP 상태 코드
                    example: 400
                  message:
                    type: string
                    description: 에러 메시지
              examples:
                PermissionDenied:
                  description: "주소록의 소유자가 아닌 경우"
                  value:
                    code: "Errors.Authorization.PermissionDenied"
                    httpStatusCode: 400
                    message: "허용되지 않은 요청입니다."
                NotExistEmail:
                  description: "구독자가 주소록에 존재하지 않는 경우 (DELETE로 삭제된 구독자 포함)"
                  value:
                    code: "Errors.List.NotExistEmail"
                    httpStatusCode: 400
                    message: "존재하지 않는 이메일 주소 입니다."
