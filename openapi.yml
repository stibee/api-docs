          items:
            type: integer
          example: [4, 5, 6]
      example:
        type: 1
        subType: 2
        abRatio: 60
        subject: "이메일 제목"
        subjectA: "이메일 제목 A"
        subjectB: "이메일 제목 B"
        senderEmail: "gildong.go@stibee.com"
        senderName: "고길동"
        senderNameA: "둘리"
        senderNameB: "희동이"
        listId: 123
        segmentIds: [1, 2, 3]
        groupIds: [4, 5, 6]
