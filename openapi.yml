      type: object
      properties:
        code:
          type: string
          enum:
            - Errors.Email.WrongStatus
          description: 에러 코드
          example: "Errors.Email.WrongStatus"
        message:
          type: string
          description: 에러 메시지
          example: "이메일 상태를 확인 하세요."
    EmailLogsResponse:
      type: object
      properties:
        total:
          type: integer
          description: 전체 데이터의 총 개수
          example: 8
        offset:
          type: integer
          description: 현재 데이터 조회가 시작되는 위치
          example: 0
        limit:
          type: integer
          description: 한 번에 가져올 데이터의 최대 개수
          example: 8
        items:
          type: array
          description: 로그 아이템 목록
          items:
            $ref: '#/components/schemas/EmailLogItem'
          example:
            - id: 1
              subscriber: "gildong.go@stibee.com"
              action: "P"
              value: ""
              value2: "250\nok"
              createdTime: "2024-07-23T18:43:08+09:00"
    EmailLogItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 로그 아이디
          example: 1
        subscriber:
          type: string
          format: email
          description: 구독자 이메일
          example: "abcd1234-ab12-cd34-ef56-abcdef123456"
        action:
          type: string
          description: |
            구독자 활동
            - P : 발송 성공
            - F : 발송 실패(소프트바운스)
            - A : 발송 실패(하드바운스)
            - D : 수신 거부
            - O : 이메일 오픈
            - C : 이메일 본문 내 링크 클릭
          enum: [P, F, A, D, O, C]
          example: "P"
        value:
          type: string
          description: |
            구독자 활동별 값
            - action이 O이면, UserAgent 정보
            - action이 C이면, 클릭한 URL
          example: ""
        value2:
          type: string
          description: |
            구독자 활동별 보조 값
            - action이 C이면, UserAgent 정보
            - action이 P, F, A이면, 발송 성공/실패 서버 응답값
          example: "250\nok"
        createdTime:
          type: string
          format: date-time
          description: 구독자 활동 생성 시간
          example: "2024-07-23T18:43:08+09:00"

