        - isMandatory
        - type
      properties:
        label:
          type: string
          description: 사용자 정의 필드를 구분하기 위한 이름
          example: "Address"
        substitution:
          type: string
          description: 메일머지 치환자를 입력하거나 구독자 정보를 API로 전송할 때 사용하는 값
          example: "addr"
        defaultValue:
          type: string
          description: 메일머지 치환자를 구독자 정보로 치환할 때, 저장된 값이 없을 때 사용하는 값
          example: ""
        isMandatory:
          type: boolean
          description: 필수 값 여부
          example: false
        type:
          type: string
          description: 사용자 정의 필드 유형(예. 텍스트, 드롭다운)
          example: "text"
    CreatedCopiedEmailResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int64
          description: 복사된 이메일 아이디
          example: 60001
    AddSenderRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          description: 발신자 이메일 주소
          format: email
          example: "abcd1234-ab12-cd34-ef56-abcdef123456"
    AddSenderResponse:
      type: object
      required:
        - authorized
      properties:
        authorized:
          type: boolean
          description: |
            추가하는 발신자 이메일의 인증 여부. 
            false이면 발신자 이메일 주소로 인증 이메일이 발송됨. 
            true이면 발송되지 않고 바로 추가됨.
          example: false
    AddSenderErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - Errors.List.NotPermittedSenderDomain
          description: 에러 코드
          example: "Errors.List.NotPermittedSenderDomain"
        httpStatusCode:
          type: integer
          description: 상태 코드
          example: 400
        message:
          type: string
          description: 에러 메시지
          example: "허용되지 않는 발신자 도메인 입니다."
    Subscriber:
      type: object
      required:
        - email # '$status'는 Subscriber 스키마의 속성이 아닌 AddSubscriberRequest의 속성인 것으로 보임, 원본 유지
        - status # 원본에는 email, status가 AddSubscriberRequest.subscriber에 있었고, BatchSubscriberRequest.subscribers[].status에 있었습니다. 일관성을 위해 BatchSubscriberRequest의 정의를 따름
      properties:
        email:
          type: string
          format: email
          description: 구독자 이메일 주소
          example: gildong.go@stibee.com
        status:
          type: string
          enum: [subscribed, unsubscribed]
          description: |
            구독자 상태
            * subscribed: 구독 중
            * unsubscribed: 수신거부
        fields:
          type: object
          description: 주소록에 생성된 사용자 정의 필드별 값 (주소록에 생성되어있는 필드만 값을 입력할 수 있음)
          example:
            name: "고길동"
    BatchSubscriberRequest:
      type: object
      required:
        - subscribers
      properties:
        subscribers:
          type: array
          items:
            $ref: '#/components/schemas/Subscriber'
          maxItems: 1000
          description: 추가할 구독자 목록 (최대 1,000명)
        updateEnabled:
          type: boolean
          default: false
          description: "구독자가 이미 존재할 경우 fields 값들의 업데이트 여부. false이면 업데이트하지 않음. true이면 새로 요청한 값으로 업데이트함."
    BatchSubscriberResponse:
      type: object
      properties:
        createdSubscribers:
          type: array
          items:
            type: string
          description: 추가 성공한 이메일 주소 목록
          example: ["gildong.go@stibee.com"]
        updatedSubscribers:
          type: array
          items:
            type: string
          description: |
            (update가 true인 경우) 업데이트 성공
            주소록에 이미 추가된 구독자임. 이메일 주소와 구독 상태 외의 다른 정보를 업데이트함
          example: ["dooly@stibee.com"]
        failAlreadyExists:
          type: array
          items:
            type: string
          description: |
            (update가 false인 경우) 추가 실패
            주소록에 이미 추가된 구독자임
          nullable: true
        failNoEmails:
          type: array
          items:
            type: string
          description: "추가 실패 - 이메일 주소 필드에 값이 없음"
          nullable: true
        failInvalidEmails:
          type: array
          items:
            type: string
          description: "추가 실패 - 이메일 주소 형식이 잘못됨"
          nullable: true
        failDuplicatedEmails:
          type: array
          items:
            type: string
          description: "추가 실패 - 요청 내 중복된 이메일 주소가 있음"
          nullable: true
        failInvalidFields:
          type: array
          items:
            type: string
          description: "추가 실패 - 사용자 정의 필드가 잘못됨"
          nullable: true
        failInvalidSubscriberStatus:
          type: array
          items:
            type: string
          description: "추가 실패 - 구독 상태가 잘못됨"
          nullable: true
    BatchSubscriberErrorResponse:
      type: object
