##############################################################################################

components:
  securitySchemes:
    AccessToken:
      type: apiKey
      name: AccessToken
      in: header
      description: Access token for use this api
  parameters:
    SortByParam:
      name: sortBy
      in: query
      required: false
      description: |
        정렬 기준
        * id: 그룹 아이디
        * name: 그룹 이름
      schema:
        type: string
        enum: [id, name]
        default: id
    SortOrderParam:
      name: sortOrder
      in: query
      required: false
      description: |
        정렬 방향
        * desc: 내림차순
        * asc: 오름차순
      schema:
        type: string
        enum: [desc, asc]
        default: desc
  schemas:
    CreateListRequest:
      type: object
      required:
        - name
        - senderName
        - companyName
        - companyContact
        - companyAddress
      properties:
        name:
          type: string
          description: 주소록 이름
          example: 주소록 이름
        senderName:
          type: string
          description: 기본 발신자 이름
          example: 고길동
        companyName:
          type: string
          description: 회사명 또는 이름
          example: 회사명
        companyContact:
          type: string
          description: 전화번호
          example: "0212341234"
        companyAddress:
          type: string
          description: 주소
          example: 서울시 중구 동호로
        useSubscriberAutoDelete:
          type: boolean
          description: 자동삭제 기능 사용 여부
          default: true
          example: true
        canSendToUnsubscribed:
          type: boolean
          description: "수신거부 구독자 발송 대상 포함 여부"
          default: false
          example: false
    CreateListResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: "주소록 아이디"
          example: 1234
    CopyListResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: "복사된 주소록 아이디"
          example: 1234
    GetListsResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 주소록 아이디
          example: 1234
        name:
          type: string
